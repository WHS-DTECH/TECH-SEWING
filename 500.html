<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Something Went Wrong - Sewing Room</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(135deg, #2d0a42 0%, #6b2d8b 45%, #b06acd 100%);
      color: #ffffff;
      padding: 1rem;
    }
    .card {
      width: min(680px, 100%);
      background: rgba(16, 14, 34, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 14px;
      padding: 1.5rem;
      backdrop-filter: blur(3px);
    }
    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      line-height: 1.15;
    }
    p {
      margin: 0.8rem 0 0;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.6;
    }
    .code {
      display: inline-block;
      margin-top: 0.9rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.35);
    }
    .actions {
      margin-top: 1.1rem;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    a {
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.45);
      padding: 0.55rem 0.95rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
    }
    a:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Something went wrong</h1>
    <p>The Sewing Room site hit an unexpected error while loading this page.</p>
    <p class="code">Error 500</p>
    <div class="actions">
      <a href="/index.html">Go to Home</a>
      <a href="javascript:location.reload()">Try Again</a>
    </div>
  </main>
</body>
</html>
